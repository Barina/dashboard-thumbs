name: Build Thumbs

on:
  push:
    paths:
      - "webp/**"
      - "png/**"
      - "gif/**"
      - "jpg/**"
      - "meta/**"
      - "build_index.py"
      - "scripts/**"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y imagemagick python3-pip
          pip install pyyaml

      - name: Generate optimized versions
        run: |
          python3 scripts/generate_sizes.py

      - name: Build index
        run: |
          python3 build_index.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git diff --cached --quiet || git commit -m "auto: generate optimized thumbs and index"
          git push